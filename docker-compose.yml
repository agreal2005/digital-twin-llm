version: "3.8"

# Spins up InfluxDB and Neo4j for the digital twin LLM layer.
# ChromaDB runs embedded (no container needed).
#
# Usage:
#   docker-compose up -d          # start
#   docker-compose down           # stop (keeps data)
#   docker-compose down -v        # stop + wipe all data

services:

  influxdb:
    image: influxdb:2.7
    container_name: digital-twin-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    adminpassword
      DOCKER_INFLUXDB_INIT_ORG:         digital-twin
      DOCKER_INFLUXDB_INIT_BUCKET:      network-metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: digital-twin-neo4j
    ports:
      - "7474:7474"   # HTTP browser UI
      - "7687:7687"   # Bolt protocol (driver connection)
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  influxdb-data:
  neo4j-data: